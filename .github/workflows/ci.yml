name: artifact-ci

on:
  push:
  pull_request:

jobs:
  test-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python experiments/run_demo_small.py
      - run: python scripts/audit_results.py
      - run: python scripts/build_paper_tables.py
      - run: python scripts/build_figures.py
      - run: python scripts/validate_csv_schema.py
      - run: python scripts/check_artifact_integrity.py
      - run: python -m pytest tests
