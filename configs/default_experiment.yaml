experiment:
  mode: diagnostic_failure_recovery
  domains: [math, literature, science, code]
  context_lengths: [4096, 6144, 8192]
  needle_depths: [10, 50, 90]
  seeds: [0, 1]
  residual_window: 128
  maximum_topk: 12
  max_new_tokens: 32
  default_seed: 0

inputs:
  model_registry: configs/model_registry.yaml
  policies: configs/policies.yaml
  cases: /path/to/cases.csv

backend:
  config: configs/backend_turboquant.yaml

selection:
  require_fp16_found: true
  require_aggressive_found: false
  exclude_execution_errors: true
